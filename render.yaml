# ═══════════════════════════════════════════════════════════
# Render.com Infrastructure as Code — RecipeAI
#
# Services:
#   recipeai-staging    QA environment, deployed on every push to main
#   recipeai-blue       Production blue slot  ┐  traffic switched via
#   recipeai-green      Production green slot ┘  Cloudflare Worker KV
#
# autoDeploy: false on all services — GitHub Actions controls all deploys.
#
# Blue and green share recipeai-production-db and recipeai-production-secrets
# so that JWT tokens stay valid across slot switches.
# ═══════════════════════════════════════════════════════════

databases:
  - name: recipeai-staging-db
    databaseName: recipeai_staging
    user: recipeai_staging
    plan: free

  - name: recipeai-production-db
    databaseName: recipeai_production
    user: recipeai_production
    plan: free

envVarGroups:
  - name: recipeai-production-secrets
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: "7d"

services:
  # ──────────────────────────────────────────────────────────
  # STAGING — QA gate, deployed on every push to main
  # ──────────────────────────────────────────────────────────
  - type: web
    name: recipeai-staging
    runtime: docker
    dockerfilePath: ./Dockerfile
    branch: main
    plan: free
    autoDeploy: false
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: staging
      - key: PORT
        value: "3000"
      - key: DATABASE_URL
        fromDatabase:
          name: recipeai-staging-db
          property: connectionString
      - key: DB_SYNCHRONIZE
        value: "true"
      - key: DB_LOGGING
        value: "false"
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: "7d"

  # ──────────────────────────────────────────────────────────
  # PRODUCTION — BLUE slot
  # Serves real traffic when Cloudflare Worker routes here.
  # ──────────────────────────────────────────────────────────
  - type: web
    name: recipeai-blue
    runtime: docker
    dockerfilePath: ./Dockerfile
    branch: main
    plan: free
    autoDeploy: false
    healthCheckPath: /health
    envVars:
      - fromGroup: recipeai-production-secrets
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: DATABASE_URL
        fromDatabase:
          name: recipeai-production-db
          property: connectionString
      - key: DB_SYNCHRONIZE
        value: "false"
      - key: DB_LOGGING
        value: "false"

  # ──────────────────────────────────────────────────────────
  # PRODUCTION — GREEN slot
  # Receives new deploys while blue serves traffic,
  # then becomes active after a successful KV switch.
  # ──────────────────────────────────────────────────────────
  - type: web
    name: recipeai-green
    runtime: docker
    dockerfilePath: ./Dockerfile
    branch: main
    plan: free
    autoDeploy: false
    healthCheckPath: /health
    envVars:
      - fromGroup: recipeai-production-secrets
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: DATABASE_URL
        fromDatabase:
          name: recipeai-production-db
          property: connectionString
      - key: DB_SYNCHRONIZE
        value: "false"
      - key: DB_LOGGING
        value: "false"
