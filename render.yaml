# ═══════════════════════════════════════════════════════════
# Render.com Infrastructure as Code — RecipeAI
# Blue-Green: staging (develop branch) + production (main branch)
# ═══════════════════════════════════════════════════════════

databases:
  - name: recipeai-staging-db
    databaseName: recipeai_staging
    user: recipeai_staging
    plan: free

  - name: recipeai-production-db
    databaseName: recipeai_production
    user: recipeai_production
    plan: free

services:
  # ──────────────────────────────────────────────────────────
  # STAGING — auto-deploys from develop branch
  # ──────────────────────────────────────────────────────────
  - type: web
    name: recipeai-staging
    runtime: docker
    dockerfilePath: ./Dockerfile
    branch: main
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: staging
      - key: PORT
        value: "3000"
      - key: DATABASE_URL
        fromDatabase:
          name: recipeai-staging-db
          property: connectionString
      - key: DB_SYNCHRONIZE
        value: "true"
      - key: DB_LOGGING
        value: "false"
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: "7d"

  # ──────────────────────────────────────────────────────────
  # PRODUCTION — auto-deploys from main branch
  # ──────────────────────────────────────────────────────────
  - type: web
    name: recipeai-production
    runtime: docker
    dockerfilePath: ./Dockerfile
    branch: main
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: DATABASE_URL
        fromDatabase:
          name: recipeai-production-db
          property: connectionString
      - key: DB_SYNCHRONIZE
        value: "false"
      - key: DB_LOGGING
        value: "false"
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: "7d"
