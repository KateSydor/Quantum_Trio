# ═══════════════════════════════════════════════════════════
# CD Pipeline — RecipeAI  •  Blue-Green Deployment
#
# Triggers:
#   push → main              deploy to staging (every push)
#   workflow_dispatch        dispatched by release.yml after a GitHub Release
#     action=deploy-production  → blue-green production deploy
#     action=rollback           → emergency traffic switch to standby slot
#
# Blue-green mechanics:
#   • Two Render services: recipeai-blue + recipeai-green
#   • Cloudflare Worker (cloudflare-worker/) proxies production traffic.
#     Worker URL: https://recipeai-router.<subdomain>.workers.dev (free, no domain needed)
#   • Traffic switch = write new ACTIVE_SLOT value to Cloudflare KV (instant)
#   • Active slot is determined by reading ACTIVE_SLOT from KV
#   • On post-switch smoke test failure: KV is reverted automatically
#
# Required secrets (Settings → Secrets and variables → Secrets):
#   RENDER_API_KEY                Render API token
#   RENDER_STAGING_SERVICE_ID     Render service ID — staging
#   RENDER_BLUE_SERVICE_ID        Render service ID — blue production slot
#   RENDER_GREEN_SERVICE_ID       Render service ID — green production slot
#   CLOUDFLARE_API_TOKEN          Cloudflare API token (Workers KV Storage:Edit)
#   CLOUDFLARE_ACCOUNT_ID         Cloudflare account ID (dashboard right sidebar)
#   CLOUDFLARE_KV_NAMESPACE_ID    KV namespace ID (from wrangler kv namespace create)
#
# Required variables (Settings → Secrets and variables → Variables):
#   PRODUCTION_DOMAIN             Worker URL, e.g. recipeai-router.YOUR.workers.dev
# ═══════════════════════════════════════════════════════════

name: RecipeAI — CD

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      action:
        description: 'deploy-production (called by release.yml) or rollback (emergency)'
        required: true
        default: 'rollback'
        type: choice
        options: [deploy-production, rollback]

permissions:
  contents: read

env:
  RENDER_API: https://api.render.com/v1
  CF_API:     https://api.cloudflare.com/client/v4

# ──────────────────────────────────────────────────────────
# STAGING — every push to main
# ──────────────────────────────────────────────────────────
jobs:
  deploy-staging:
    name: 🟦 Deploy → Staging
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    environment:
      name: staging
      url: ${{ steps.get-url.outputs.url }}
    steps:
      - name: Trigger Render staging deploy
        id: trigger
        run: |
          RESPONSE=$(curl -sf -X POST \
            "${{ env.RENDER_API }}/services/${{ secrets.RENDER_STAGING_SERVICE_ID }}/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": "do_not_clear"}')
          echo "deploy_id=$(echo "$RESPONSE" | jq -r '.id')" >> "$GITHUB_OUTPUT"

      - name: Wait for staging deploy
        timeout-minutes: 10
        run: |
          for i in $(seq 1 40); do
            STATUS=$(curl -sf \
              "${{ env.RENDER_API }}/services/${{ secrets.RENDER_STAGING_SERVICE_ID }}/deploys/${{ steps.trigger.outputs.deploy_id }}" \
              -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" | jq -r '.status')
            echo "[$i/40] $STATUS"
            [ "$STATUS" = "live" ] && exit 0
            [[ "$STATUS" =~ ^(deactivated|build_failed|update_failed)$ ]] && echo "Deploy failed: $STATUS" && exit 1
            sleep 15
          done
          echo "Timed out" && exit 1

      - name: Get staging URL
        id: get-url
        run: |
          URL=$(curl -sf "${{ env.RENDER_API }}/services/${{ secrets.RENDER_STAGING_SERVICE_ID }}" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" | jq -r '.serviceDetails.url')
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Smoke tests — staging
        run: |
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "${{ steps.get-url.outputs.url }}/health")
          [ "$STATUS" != "200" ] && echo "Health check failed: HTTP $STATUS" && exit 1
          echo "✓ /health → 200"

      - name: Summary
        if: success()
        run: |
          echo "## 🟦 Staging deployed" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** ${{ steps.get-url.outputs.url }}  **Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY

  # ──────────────────────────────────────────────────────────
  # Step 1: read ACTIVE_SLOT from Cloudflare KV → know which slot is live
  # ──────────────────────────────────────────────────────────
  determine-slots:
    name: 🔵🟢 Determine Active / Inactive Slots
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.action == 'deploy-production'
    outputs:
      active_slot:         ${{ steps.resolve.outputs.active_slot }}
      inactive_slot:       ${{ steps.resolve.outputs.inactive_slot }}
      active_service_id:   ${{ steps.resolve.outputs.active_service_id }}
      inactive_service_id: ${{ steps.resolve.outputs.inactive_service_id }}
    steps:
      - name: Read ACTIVE_SLOT from Cloudflare KV
        id: resolve
        run: |
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
            "${{ env.CF_API }}/accounts/${{ secrets.CLOUDFLARE_ACCOUNT_ID }}/storage/kv/namespaces/${{ secrets.CLOUDFLARE_KV_NAMESPACE_ID }}/values/ACTIVE_SLOT" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}")

          HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS" | cut -d: -f2)
          ACTIVE=$(echo "$RESPONSE" | grep -v "HTTP_STATUS")
          echo "KV response status: $HTTP_STATUS"
          echo "KV response body: $ACTIVE"

          if [ "$HTTP_STATUS" != "200" ] || [ -z "$ACTIVE" ] || [ "$ACTIVE" = "null" ]; then
            echo "KV read failed (HTTP $HTTP_STATUS) — defaulting to blue"
            ACTIVE="blue"
          fi
          echo "KV ACTIVE_SLOT: $ACTIVE"

          if [ "$ACTIVE" = "green" ]; then
            INACTIVE="blue"
            ACTIVE_ID="${{ secrets.RENDER_GREEN_SERVICE_ID }}"
            INACTIVE_ID="${{ secrets.RENDER_BLUE_SERVICE_ID }}"
          else
            INACTIVE="green"
            ACTIVE_ID="${{ secrets.RENDER_BLUE_SERVICE_ID }}"
            INACTIVE_ID="${{ secrets.RENDER_GREEN_SERVICE_ID }}"
          fi

          echo "active_slot=$ACTIVE"              >> "$GITHUB_OUTPUT"
          echo "inactive_slot=$INACTIVE"          >> "$GITHUB_OUTPUT"
          echo "active_service_id=$ACTIVE_ID"     >> "$GITHUB_OUTPUT"
          echo "inactive_service_id=$INACTIVE_ID" >> "$GITHUB_OUTPUT"
          echo "Active: $ACTIVE  →  Deploying to: $INACTIVE"

  # ──────────────────────────────────────────────────────────
  # Step 2: deploy new version to inactive slot.
  # Worker still routes 100% of traffic to the active slot.
  # ──────────────────────────────────────────────────────────
  deploy-inactive-slot:
    name: 🚀 Deploy → ${{ needs.determine-slots.outputs.inactive_slot }} (inactive)
    runs-on: ubuntu-latest
    needs: determine-slots
    environment:
      name: production-${{ needs.determine-slots.outputs.inactive_slot }}
      url: ${{ steps.get-url.outputs.url }}
    outputs:
      slot_url:  ${{ steps.get-url.outputs.url }}
      deploy_id: ${{ steps.trigger.outputs.deploy_id }}
    steps:
      - name: Trigger deploy on inactive slot
        id: trigger
        run: |
          RESPONSE=$(curl -sf -X POST \
            "${{ env.RENDER_API }}/services/${{ needs.determine-slots.outputs.inactive_service_id }}/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": "do_not_clear"}')
          DEPLOY_ID=$(echo "$RESPONSE" | jq -r '.id')
          echo "deploy_id=$DEPLOY_ID" >> "$GITHUB_OUTPUT"
          echo "Triggered on ${{ needs.determine-slots.outputs.inactive_slot }}: $DEPLOY_ID"

      - name: Wait for deploy
        timeout-minutes: 10
        run: |
          for i in $(seq 1 40); do
            STATUS=$(curl -sf \
              "${{ env.RENDER_API }}/services/${{ needs.determine-slots.outputs.inactive_service_id }}/deploys/${{ steps.trigger.outputs.deploy_id }}" \
              -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" | jq -r '.status')
            echo "[$i/40] ${{ needs.determine-slots.outputs.inactive_slot }}: $STATUS"
            [ "$STATUS" = "live" ] && exit 0
            [[ "$STATUS" =~ ^(deactivated|build_failed|update_failed)$ ]] && echo "Deploy failed: $STATUS" && exit 1
            sleep 15
          done
          echo "Timed out" && exit 1

      - name: Get inactive slot URL
        id: get-url
        run: |
          URL=$(curl -sf "${{ env.RENDER_API }}/services/${{ needs.determine-slots.outputs.inactive_service_id }}" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" | jq -r '.serviceDetails.url')
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Pre-switch smoke tests (no user traffic yet)
        run: |
          BASE_URL="${{ steps.get-url.outputs.url }}"
          echo "Testing ${{ needs.determine-slots.outputs.inactive_slot }} before switching traffic"
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "$BASE_URL/health")
          [ "$STATUS" != "200" ] && echo "Health check failed: HTTP $STATUS" && exit 1
          echo "✓ /health → 200"
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "$BASE_URL/docs")
          [[ ! "$STATUS" =~ ^(200|301|302)$ ]] && echo "Docs check failed: HTTP $STATUS" && exit 1
          echo "✓ /docs → $STATUS"
          echo "Pre-switch checks passed — ready to switch traffic"

  # ──────────────────────────────────────────────────────────
  # Step 3: switch traffic — write new ACTIVE_SLOT to Cloudflare KV.
  # Worker picks up the new value on the next request (instant).
  # Old slot stays running as an instant rollback target.
  # ──────────────────────────────────────────────────────────
  switch-traffic:
    name: 🔀 Switch Traffic → ${{ needs.determine-slots.outputs.inactive_slot }}
    runs-on: ubuntu-latest
    needs: [determine-slots, deploy-inactive-slot]
    steps:
      - name: Write new ACTIVE_SLOT to Cloudflare KV
        run: |
          NEW_SLOT="${{ needs.determine-slots.outputs.inactive_slot }}"
          curl -sf -X PUT \
            "${{ env.CF_API }}/accounts/${{ secrets.CLOUDFLARE_ACCOUNT_ID }}/storage/kv/namespaces/${{ secrets.CLOUDFLARE_KV_NAMESPACE_ID }}/values/ACTIVE_SLOT" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -d "$NEW_SLOT"
          echo "KV ACTIVE_SLOT → $NEW_SLOT"

      - name: Post-switch smoke test (Worker URL)
        run: |
          sleep 3
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "https://${{ vars.PRODUCTION_DOMAIN }}/health")
          [ "$STATUS" != "200" ] && echo "Post-switch health check failed: HTTP $STATUS" && exit 1
          echo "✓ https://${{ vars.PRODUCTION_DOMAIN }}/health → 200"
          echo "Traffic now routed to ${{ needs.determine-slots.outputs.inactive_slot }} slot"

  # ──────────────────────────────────────────────────────────
  # Step 4: summary
  # ──────────────────────────────────────────────────────────
  deployment-summary:
    name: ✅ Production Live
    runs-on: ubuntu-latest
    needs: [determine-slots, deploy-inactive-slot, switch-traffic]
    steps:
      - name: Summary
        run: |
          echo "## 🟩 Blue-Green Deploy Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Now live** | \`${{ needs.determine-slots.outputs.inactive_slot }}\` slot |" >> $GITHUB_STEP_SUMMARY
          echo "| **Standby** | \`${{ needs.determine-slots.outputs.active_slot }}\` slot (instant rollback) |" >> $GITHUB_STEP_SUMMARY
          echo "| **Production** | https://${{ vars.PRODUCTION_DOMAIN }} |" >> $GITHUB_STEP_SUMMARY

  # ──────────────────────────────────────────────────────────
  # AUTO-ROLLBACK — fires only when switch-traffic fails.
  # Reverts KV ACTIVE_SLOT back to the previously active slot.
  # ──────────────────────────────────────────────────────────
  auto-rollback:
    name: ⏪ Auto-Rollback → ${{ needs.determine-slots.outputs.active_slot }}
    runs-on: ubuntu-latest
    needs: [determine-slots, switch-traffic]
    if: always() && needs.determine-slots.result == 'success' && needs.switch-traffic.result == 'failure'
    steps:
      - name: Revert KV ACTIVE_SLOT to previous active slot
        run: |
          PREV_SLOT="${{ needs.determine-slots.outputs.active_slot }}"
          curl -sf -X PUT \
            "${{ env.CF_API }}/accounts/${{ secrets.CLOUDFLARE_ACCOUNT_ID }}/storage/kv/namespaces/${{ secrets.CLOUDFLARE_KV_NAMESPACE_ID }}/values/ACTIVE_SLOT" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -d "$PREV_SLOT"
          echo "KV ACTIVE_SLOT reverted to $PREV_SLOT"

      - name: Summary
        run: |
          echo "## ⏪ Auto-Rollback Executed" >> $GITHUB_STEP_SUMMARY
          echo "Traffic reverted to: \`${{ needs.determine-slots.outputs.active_slot }}\` slot" >> $GITHUB_STEP_SUMMARY

  # ──────────────────────────────────────────────────────────
  # MANUAL ROLLBACK — workflow_dispatch action=rollback.
  # Reads current KV ACTIVE_SLOT and switches to the other slot.
  # ──────────────────────────────────────────────────────────
  manual-rollback:
    name: ⏪ Manual Rollback
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.action == 'rollback'
    steps:
      - name: Read current ACTIVE_SLOT and determine rollback target
        id: resolve
        run: |
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
            "${{ env.CF_API }}/accounts/${{ secrets.CLOUDFLARE_ACCOUNT_ID }}/storage/kv/namespaces/${{ secrets.CLOUDFLARE_KV_NAMESPACE_ID }}/values/ACTIVE_SLOT" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}")
          HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS" | cut -d: -f2)
          CURRENT=$(echo "$RESPONSE" | grep -v "HTTP_STATUS")
          [ "$HTTP_STATUS" != "200" ] || [ -z "$CURRENT" ] || [ "$CURRENT" = "null" ] && CURRENT="blue"

          if [ "$CURRENT" = "green" ]; then
            TARGET="blue"; TARGET_ID="${{ secrets.RENDER_BLUE_SERVICE_ID }}"
          else
            TARGET="green"; TARGET_ID="${{ secrets.RENDER_GREEN_SERVICE_ID }}"
          fi
          echo "target_slot=$TARGET"          >> "$GITHUB_OUTPUT"
          echo "target_service_id=$TARGET_ID" >> "$GITHUB_OUTPUT"
          echo "Rolling back from $CURRENT to $TARGET"

      - name: Smoke test rollback target before switching
        run: |
          BASE_URL=$(curl -sf "${{ env.RENDER_API }}/services/${{ steps.resolve.outputs.target_service_id }}" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" | jq -r '.serviceDetails.url')
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "$BASE_URL/health")
          [ "$STATUS" != "200" ] && echo "Rollback target health check failed: HTTP $STATUS" && exit 1
          echo "✓ Rollback target /health → 200"

      - name: Switch KV ACTIVE_SLOT to rollback target
        run: |
          curl -sf -X PUT \
            "${{ env.CF_API }}/accounts/${{ secrets.CLOUDFLARE_ACCOUNT_ID }}/storage/kv/namespaces/${{ secrets.CLOUDFLARE_KV_NAMESPACE_ID }}/values/ACTIVE_SLOT" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -d "${{ steps.resolve.outputs.target_slot }}"
          echo "KV ACTIVE_SLOT → ${{ steps.resolve.outputs.target_slot }}"

      - name: Summary
        run: |
          echo "## ⏪ Manual Rollback Complete" >> $GITHUB_STEP_SUMMARY
          echo "Now routed to: \`${{ steps.resolve.outputs.target_slot }}\` slot" >> $GITHUB_STEP_SUMMARY
