# ═══════════════════════════════════════════════════════════
# CD Pipeline — RecipeAI  •  Blue-Green Deployment
#
# Triggers:
#   push → main              deploy to staging (every push)
#   workflow_dispatch        dispatched by release.yml after a GitHub Release
#     action=deploy-production  → blue-green production deploy
#     action=rollback           → emergency traffic switch to standby slot
#
# Blue-green mechanics:
#   • Two Render services: recipeai-blue + recipeai-green
#   • Cloudflare Worker proxies traffic; switch = write ACTIVE_SLOT to KV
#   • Active slot is determined by reading ACTIVE_SLOT from Cloudflare KV
#   • On KV read failure: defaults to "blue" and continues
#   • On post-switch smoke test failure: KV is reverted automatically
#
# Required secrets:
#   RENDER_API_KEY                Render API token
#   RENDER_STAGING_SERVICE_ID     Render service ID — staging
#   RENDER_BLUE_SERVICE_ID        Render service ID — blue slot
#   RENDER_GREEN_SERVICE_ID       Render service ID — green slot
#   CLOUDFLARE_API_TOKEN          Cloudflare API token (Workers KV Storage:Edit)
#   CLOUDFLARE_ACCOUNT_ID         Cloudflare account ID
#   CLOUDFLARE_KV_NAMESPACE_ID    KV namespace ID for BLUE_GREEN_SLOTS
#
# Required variables:
#   PRODUCTION_DOMAIN             Worker URL, e.g. recipeai-router.YOUR.workers.dev
# ═══════════════════════════════════════════════════════════

name: RecipeAI — CD

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      action:
        description: 'deploy-production (called by release.yml) or rollback (emergency)'
        required: true
        default: 'rollback'
        type: choice
        options: [deploy-production, rollback]

permissions:
  contents: read

env:
  RENDER_API: https://api.render.com/v1
  CF_API:     https://api.cloudflare.com/client/v4

# ──────────────────────────────────────────────────────────
# STAGING — every push to main
# ──────────────────────────────────────────────────────────
jobs:
  deploy-staging:
    name: 🟦 Deploy → Staging
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    environment:
      name: staging
      url: ${{ steps.get-url.outputs.url }}
    steps:
      - name: "🔍 Secrets check"
        run: |
          echo "=== SECRETS LENGTH CHECK ==="
          echo "RENDER_API_KEY         : ${#RENDER_API_KEY_VAL} chars"
          echo "RENDER_STAGING_SERVICE_ID: ${#STAGING_ID_VAL} chars"
          [ -z "$RENDER_API_KEY_VAL" ]  && echo "❌ RENDER_API_KEY is EMPTY"           || echo "✓ RENDER_API_KEY set"
          [ -z "$STAGING_ID_VAL" ]      && echo "❌ RENDER_STAGING_SERVICE_ID is EMPTY" || echo "✓ RENDER_STAGING_SERVICE_ID set"
        env:
          RENDER_API_KEY_VAL: ${{ secrets.RENDER_API_KEY }}
          STAGING_ID_VAL:     ${{ secrets.RENDER_STAGING_SERVICE_ID }}

      - name: Trigger Render staging deploy
        id: trigger
        run: |
          echo "=== TRIGGERING STAGING DEPLOY ==="
          echo "URL: ${{ env.RENDER_API }}/services/${{ secrets.RENDER_STAGING_SERVICE_ID }}/deploys"
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST \
            "${{ env.RENDER_API }}/services/${{ secrets.RENDER_STAGING_SERVICE_ID }}/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": "do_not_clear"}')
          HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS" | cut -d: -f2)
          BODY=$(echo "$RESPONSE" | grep -v "HTTP_STATUS")
          echo "Response status : $HTTP_STATUS"
          echo "Response body   : $BODY"
          if [ "$HTTP_STATUS" != "200" ] && [ "$HTTP_STATUS" != "201" ]; then
            echo "❌ Render API returned HTTP $HTTP_STATUS"
            exit 1
          fi
          DEPLOY_ID=$(echo "$BODY" | jq -r '.id')
          echo "deploy_id=$DEPLOY_ID" >> "$GITHUB_OUTPUT"
          echo "✓ Deploy triggered: $DEPLOY_ID"

      - name: Wait for staging deploy
        timeout-minutes: 10
        run: |
          echo "=== POLLING STAGING DEPLOY: ${{ steps.trigger.outputs.deploy_id }} ==="
          for i in $(seq 1 40); do
            RESP=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
              "${{ env.RENDER_API }}/services/${{ secrets.RENDER_STAGING_SERVICE_ID }}/deploys/${{ steps.trigger.outputs.deploy_id }}" \
              -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}")
            HTTP_STATUS=$(echo "$RESP" | grep "HTTP_STATUS" | cut -d: -f2)
            STATUS=$(echo "$RESP" | grep -v "HTTP_STATUS" | jq -r '.status')
            echo "[$i/40] HTTP=$HTTP_STATUS  status=$STATUS"
            [ "$STATUS" = "live" ] && echo "✓ Deploy is live" && exit 0
            [[ "$STATUS" =~ ^(deactivated|build_failed|update_failed)$ ]] && echo "❌ Deploy failed: $STATUS" && exit 1
            sleep 15
          done
          echo "❌ Timed out after 10 minutes" && exit 1

      - name: Get staging URL
        id: get-url
        run: |
          echo "=== FETCHING STAGING SERVICE URL ==="
          RESP=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
            "${{ env.RENDER_API }}/services/${{ secrets.RENDER_STAGING_SERVICE_ID }}" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}")
          HTTP_STATUS=$(echo "$RESP" | grep "HTTP_STATUS" | cut -d: -f2)
          BODY=$(echo "$RESP" | grep -v "HTTP_STATUS")
          URL=$(echo "$BODY" | jq -r '.serviceDetails.url')
          echo "HTTP=$HTTP_STATUS  URL=$URL"
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Smoke tests — staging
        run: |
          echo "=== SMOKE TEST: ${{ steps.get-url.outputs.url }}/health ==="
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ steps.get-url.outputs.url }}/health")
          echo "HTTP status: $STATUS"
          [ "$STATUS" != "200" ] && echo "❌ Health check failed" && exit 1
          echo "✓ /health → 200"

      - name: Summary
        if: always()
        run: |
          echo "## 🟦 Staging Deploy" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** ${{ steps.get-url.outputs.url }}  **Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY

  # ──────────────────────────────────────────────────────────
  # Step 1: read ACTIVE_SLOT from wrangler.toml [vars]
  # ──────────────────────────────────────────────────────────
  determine-slots:
    name: 🔵🟢 Determine Active / Inactive Slots
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.action == 'deploy-production'
    outputs:
      active_slot:   ${{ steps.resolve.outputs.active_slot }}
      inactive_slot: ${{ steps.resolve.outputs.inactive_slot }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: "🔍 Secrets check"
        run: |
          echo "=== SECRETS LENGTH CHECK ==="
          echo "RENDER_API_KEY         : ${#RK} chars"
          echo "RENDER_BLUE_SERVICE_ID : ${#BLUE} chars"
          echo "RENDER_GREEN_SERVICE_ID: ${#GREEN} chars"
          echo "CLOUDFLARE_API_TOKEN   : ${#CF_TOKEN} chars"
          echo "CLOUDFLARE_ACCOUNT_ID  : ${#CF_ACCOUNT} chars"
          [ -z "$RK" ]       && echo "❌ RENDER_API_KEY is EMPTY"            || echo "✓ RENDER_API_KEY"
          [ -z "$BLUE" ]     && echo "❌ RENDER_BLUE_SERVICE_ID is EMPTY"    || echo "✓ RENDER_BLUE_SERVICE_ID"
          [ -z "$GREEN" ]    && echo "❌ RENDER_GREEN_SERVICE_ID is EMPTY"   || echo "✓ RENDER_GREEN_SERVICE_ID"
          [ -z "$CF_TOKEN" ] && echo "❌ CLOUDFLARE_API_TOKEN is EMPTY"      || echo "✓ CLOUDFLARE_API_TOKEN"
          [ -z "$CF_ACCOUNT" ] && echo "❌ CLOUDFLARE_ACCOUNT_ID is EMPTY"  || echo "✓ CLOUDFLARE_ACCOUNT_ID"
        env:
          RK:         ${{ secrets.RENDER_API_KEY }}
          BLUE:       ${{ secrets.RENDER_BLUE_SERVICE_ID }}
          GREEN:      ${{ secrets.RENDER_GREEN_SERVICE_ID }}
          CF_TOKEN:   ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Read ACTIVE_SLOT from wrangler.toml
        id: resolve
        run: |
          echo "=== READING ACTIVE_SLOT FROM wrangler.toml ==="
          ACTIVE=$(grep 'ACTIVE_SLOT' cloudflare-worker/wrangler.toml | head -1 | cut -d'"' -f2)
          [ -z "$ACTIVE" ] && ACTIVE="blue"
          echo "Resolved ACTIVE_SLOT: $ACTIVE"

          if [ "$ACTIVE" = "green" ]; then
            INACTIVE="blue"
            ACTIVE_ID="${{ secrets.RENDER_GREEN_SERVICE_ID }}"
            INACTIVE_ID="${{ secrets.RENDER_BLUE_SERVICE_ID }}"
          else
            INACTIVE="green"
            ACTIVE_ID="${{ secrets.RENDER_BLUE_SERVICE_ID }}"
            INACTIVE_ID="${{ secrets.RENDER_GREEN_SERVICE_ID }}"
          fi

          # Only slot names are passed through outputs — secret values cannot be
          # passed through job outputs (GitHub Actions strips them for security).
          # Service IDs are read directly from secrets in each downstream job.
          echo "Active slot  : $ACTIVE"
          echo "Inactive slot: $INACTIVE"
          echo "active_slot=$ACTIVE"    >> "$GITHUB_OUTPUT"
          echo "inactive_slot=$INACTIVE" >> "$GITHUB_OUTPUT"
          echo "✓ Slots resolved — deploying to: $INACTIVE"

  # ──────────────────────────────────────────────────────────
  # Step 2: deploy new version to inactive slot
  # ──────────────────────────────────────────────────────────
  deploy-inactive-slot:
    name: 🚀 Deploy → ${{ needs.determine-slots.outputs.inactive_slot }} (inactive)
    runs-on: ubuntu-latest
    needs: determine-slots
    environment:
      name: production-${{ needs.determine-slots.outputs.inactive_slot }}
      url: ${{ steps.get-url.outputs.url }}
    outputs:
      slot_url:  ${{ steps.get-url.outputs.url }}
      deploy_id: ${{ steps.trigger.outputs.deploy_id }}
    steps:
      - name: "🔍 Resolve service ID from slot name"
        id: resolve-svc
        run: |
          SLOT="${{ needs.determine-slots.outputs.inactive_slot }}"
          echo "=== RESOLVE SERVICE ID FOR SLOT: $SLOT ==="
          if [ "$SLOT" = "green" ]; then
            SVC_ID="${{ secrets.RENDER_GREEN_SERVICE_ID }}"
          else
            SVC_ID="${{ secrets.RENDER_BLUE_SERVICE_ID }}"
          fi
          echo "Service ID length: ${#SVC_ID} chars"
          [ -z "$SVC_ID" ] && echo "❌ Service ID for '$SLOT' slot is EMPTY — check RENDER_BLUE_SERVICE_ID / RENDER_GREEN_SERVICE_ID secrets" && exit 1
          echo "✓ Service ID resolved"
          echo "svc_id=$SVC_ID" >> "$GITHUB_OUTPUT"

      - name: Trigger deploy on inactive slot
        id: trigger
        run: |
          SVC_ID="${{ steps.resolve-svc.outputs.svc_id }}"
          SLOT="${{ needs.determine-slots.outputs.inactive_slot }}"
          echo "=== TRIGGERING DEPLOY ON $SLOT SLOT ==="
          echo "Service ID : $SVC_ID"
          echo "URL        : ${{ env.RENDER_API }}/services/$SVC_ID/deploys"

          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST \
            "${{ env.RENDER_API }}/services/$SVC_ID/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": "do_not_clear"}')
          HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS" | cut -d: -f2)
          BODY=$(echo "$RESPONSE" | grep -v "HTTP_STATUS")
          echo "Response status: $HTTP_STATUS"
          echo "Response body  : $BODY"

          if [ "$HTTP_STATUS" != "200" ] && [ "$HTTP_STATUS" != "201" ]; then
            echo "❌ Render API returned HTTP $HTTP_STATUS"
            exit 1
          fi
          DEPLOY_ID=$(echo "$BODY" | jq -r '.id')
          echo "deploy_id=$DEPLOY_ID" >> "$GITHUB_OUTPUT"
          echo "✓ Deploy triggered: $DEPLOY_ID"

      - name: Wait for deploy
        timeout-minutes: 10
        run: |
          SVC_ID="${{ steps.resolve-svc.outputs.svc_id }}"
          echo "=== POLLING DEPLOY: ${{ steps.trigger.outputs.deploy_id }} ==="
          for i in $(seq 1 40); do
            RESP=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
              "${{ env.RENDER_API }}/services/$SVC_ID/deploys/${{ steps.trigger.outputs.deploy_id }}" \
              -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}")
            HTTP_STATUS=$(echo "$RESP" | grep "HTTP_STATUS" | cut -d: -f2)
            STATUS=$(echo "$RESP" | grep -v "HTTP_STATUS" | jq -r '.status')
            echo "[$i/40] HTTP=$HTTP_STATUS  deploy_status=$STATUS"
            [ "$STATUS" = "live" ] && echo "✓ Deploy is live" && exit 0
            [[ "$STATUS" =~ ^(deactivated|build_failed|update_failed)$ ]] && echo "❌ Deploy failed: $STATUS" && exit 1
            sleep 15
          done
          echo "❌ Timed out" && exit 1

      - name: Get inactive slot URL
        id: get-url
        run: |
          SVC_ID="${{ steps.resolve-svc.outputs.svc_id }}"
          echo "=== FETCHING SERVICE URL ==="
          RESP=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
            "${{ env.RENDER_API }}/services/$SVC_ID" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}")
          HTTP_STATUS=$(echo "$RESP" | grep "HTTP_STATUS" | cut -d: -f2)
          BODY=$(echo "$RESP" | grep -v "HTTP_STATUS")
          URL=$(echo "$BODY" | jq -r '.serviceDetails.url')
          echo "HTTP=$HTTP_STATUS  URL=$URL"
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Pre-switch smoke tests
        run: |
          BASE_URL="${{ steps.get-url.outputs.url }}"
          echo "=== SMOKE TESTS against $BASE_URL ==="

          echo "--- /health ---"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$BASE_URL/health")
          echo "HTTP: $STATUS"
          [ "$STATUS" != "200" ] && echo "❌ /health failed" && exit 1
          echo "✓ /health → 200"

          echo "--- /docs ---"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$BASE_URL/docs")
          echo "HTTP: $STATUS"
          [[ ! "$STATUS" =~ ^(200|301|302)$ ]] && echo "❌ /docs failed" && exit 1
          echo "✓ /docs → $STATUS"

  # ──────────────────────────────────────────────────────────
  # Step 3: switch traffic via Cloudflare KV
  # ──────────────────────────────────────────────────────────
  switch-traffic:
    name: 🔀 Switch Traffic → ${{ needs.determine-slots.outputs.inactive_slot }}
    runs-on: ubuntu-latest
    needs: [determine-slots, deploy-inactive-slot]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: "🔀 Redeploy Worker with new ACTIVE_SLOT=${{ needs.determine-slots.outputs.inactive_slot }}"
        run: |
          NEW_SLOT="${{ needs.determine-slots.outputs.inactive_slot }}"
          echo "=== SWITCHING TRAFFIC: redeploying Worker with ACTIVE_SLOT=$NEW_SLOT ==="
          npx wrangler@3 deploy \
            --var ACTIVE_SLOT:"$NEW_SLOT" \
            --compatibility-date 2024-09-23 \
            --name recipeai-router
        working-directory: cloudflare-worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Post-switch smoke test
        run: |
          echo "=== POST-SWITCH TEST: https://${{ vars.PRODUCTION_DOMAIN }}/health ==="
          sleep 3
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://${{ vars.PRODUCTION_DOMAIN }}/health")
          echo "HTTP: $STATUS"
          [ "$STATUS" != "200" ] && echo "❌ Post-switch health check failed" && exit 1
          echo "✓ Production /health → 200"

  # ──────────────────────────────────────────────────────────
  # Step 4: summary
  # ──────────────────────────────────────────────────────────
  deployment-summary:
    name: ✅ Production Live
    runs-on: ubuntu-latest
    needs: [determine-slots, deploy-inactive-slot, switch-traffic]
    if: always()
    steps:
      - name: Summary
        run: |
          echo "## 🟩 Blue-Green Deploy" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **determine-slots**    | ${{ needs.determine-slots.result }} |"    >> $GITHUB_STEP_SUMMARY
          echo "| **deploy-inactive**    | ${{ needs.deploy-inactive-slot.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **switch-traffic**     | ${{ needs.switch-traffic.result }} |"     >> $GITHUB_STEP_SUMMARY
          echo "| **Now live** | \`${{ needs.determine-slots.outputs.inactive_slot }}\` slot |" >> $GITHUB_STEP_SUMMARY
          echo "| **Standby**  | \`${{ needs.determine-slots.outputs.active_slot }}\` slot |" >> $GITHUB_STEP_SUMMARY
          echo "| **Production** | https://${{ vars.PRODUCTION_DOMAIN }} |" >> $GITHUB_STEP_SUMMARY

  # ──────────────────────────────────────────────────────────
  # AUTO-ROLLBACK — fires only when switch-traffic fails
  # ──────────────────────────────────────────────────────────
  auto-rollback:
    name: ⏪ Auto-Rollback → ${{ needs.determine-slots.outputs.active_slot }}
    runs-on: ubuntu-latest
    needs: [determine-slots, switch-traffic]
    if: always() && needs.determine-slots.result == 'success' && needs.switch-traffic.result == 'failure'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Revert Worker to previous slot
        run: |
          PREV_SLOT="${{ needs.determine-slots.outputs.active_slot }}"
          echo "=== AUTO-ROLLBACK: reverting Worker ACTIVE_SLOT → $PREV_SLOT ==="
          npx wrangler@3 deploy \
            --var ACTIVE_SLOT:"$PREV_SLOT" \
            --compatibility-date 2024-09-23 \
            --name recipeai-router
          echo "⏪ Worker reverted to $PREV_SLOT"
        working-directory: cloudflare-worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  # ──────────────────────────────────────────────────────────
  # MANUAL ROLLBACK — workflow_dispatch action=rollback
  # ──────────────────────────────────────────────────────────
  manual-rollback:
    name: ⏪ Manual Rollback
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.action == 'rollback'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read current Worker ACTIVE_SLOT
        id: resolve
        run: |
          echo "=== READING CURRENT ACTIVE_SLOT FROM WORKER ENV ==="
          CURRENT=$(npx wrangler@3 secret list --name recipeai-router 2>/dev/null \
            | jq -r '.[] | select(.name=="ACTIVE_SLOT") | .name' || echo "")
          # Fall back: read from wrangler.toml [vars]
          CURRENT=$(grep 'ACTIVE_SLOT' cloudflare-worker/wrangler.toml | head -1 | cut -d'"' -f2)
          [ -z "$CURRENT" ] && CURRENT="blue"
          echo "Current ACTIVE_SLOT: $CURRENT"
          if [ "$CURRENT" = "green" ]; then TARGET="blue"; else TARGET="green"; fi
          echo "Rolling back from $CURRENT → $TARGET"
          echo "target_slot=$TARGET" >> "$GITHUB_OUTPUT"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Smoke test rollback target
        run: |
          TARGET="${{ steps.resolve.outputs.target_slot }}"
          if [ "$TARGET" = "green" ]; then
            SVC_ID="${{ secrets.RENDER_GREEN_SERVICE_ID }}"
          else
            SVC_ID="${{ secrets.RENDER_BLUE_SERVICE_ID }}"
          fi
          echo "=== SMOKE TEST ON ROLLBACK TARGET ($TARGET) ==="
          [ -z "$SVC_ID" ] && echo "❌ Service ID empty for $TARGET" && exit 1
          BASE_URL=$(curl -s "${{ env.RENDER_API }}/services/$SVC_ID" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" | jq -r '.serviceDetails.url')
          echo "Target URL: $BASE_URL"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$BASE_URL/health")
          echo "HTTP: $STATUS"
          [ "$STATUS" != "200" ] && echo "❌ Rollback target unhealthy" && exit 1
          echo "✓ Rollback target /health → 200"

      - name: Redeploy Worker with rollback slot
        run: |
          TARGET="${{ steps.resolve.outputs.target_slot }}"
          echo "=== REDEPLOYING WORKER WITH ACTIVE_SLOT=$TARGET ==="
          npx wrangler@3 deploy \
            --var ACTIVE_SLOT:"$TARGET" \
            --compatibility-date 2024-09-23 \
            --name recipeai-router
          echo "✓ ACTIVE_SLOT → $TARGET"
        working-directory: cloudflare-worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Summary
        run: |
          echo "## ⏪ Manual Rollback" >> $GITHUB_STEP_SUMMARY
          echo "Now routed to: \`${{ steps.resolve.outputs.target_slot }}\` slot" >> $GITHUB_STEP_SUMMARY
