# ═══════════════════════════════════════════════════════════
# CD Pipeline — RecipeAI
# Blue-Green deployment strategy:
#   develop → staging  (auto on push)
#   main    → production (auto on push, after staging smoke tests)
# ═══════════════════════════════════════════════════════════

name: RecipeAI — CD

on:
  push:
    branches: [main]          # every push to main → staging
  release:
    types: [published]        # release-please tag → production
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to rollback'
        required: true
        default: 'production'
        type: choice
        options: [staging, production]

permissions:
  contents: read

env:
  RENDER_API: https://api.render.com/v1

# ──────────────────────────────────────────────────────────
# STAGING — triggered by push to develop
# ──────────────────────────────────────────────────────────
jobs:
  deploy-staging:
    name: 🟦 Deploy → Staging
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    environment:
      name: staging
      url: ${{ steps.get-url.outputs.url }}
    outputs:
      deploy_id: ${{ steps.trigger.outputs.deploy_id }}

    steps:
      - name: Trigger Render staging deploy
        id: trigger
        run: |
          RESPONSE=$(curl -sf -X POST "${{ env.RENDER_API }}/services/${{ secrets.RENDER_STAGING_SERVICE_ID }}/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": "do_not_clear"}')
          DEPLOY_ID=$(echo "$RESPONSE" | jq -r '.id')
          echo "deploy_id=$DEPLOY_ID" >> "$GITHUB_OUTPUT"
          echo "Triggered deploy: $DEPLOY_ID"

      - name: Wait for staging deploy to complete
        timeout-minutes: 10
        run: |
          DEPLOY_ID="${{ steps.trigger.outputs.deploy_id }}"
          echo "Polling deploy $DEPLOY_ID..."
          for i in $(seq 1 40); do
            STATUS=$(curl -sf "${{ env.RENDER_API }}/services/${{ secrets.RENDER_STAGING_SERVICE_ID }}/deploys/$DEPLOY_ID" \
              -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" | jq -r '.status')
            echo "  [$i/40] status: $STATUS"
            if [ "$STATUS" = "live" ]; then
              echo "Deploy is live!"
              exit 0
            fi
            if [ "$STATUS" = "deactivated" ] || [ "$STATUS" = "build_failed" ] || [ "$STATUS" = "update_failed" ]; then
              echo "Deploy failed with status: $STATUS"
              exit 1
            fi
            sleep 15
          done
          echo "Timed out waiting for deploy"
          exit 1

      - name: Get staging URL
        id: get-url
        run: |
          URL=$(curl -sf "${{ env.RENDER_API }}/services/${{ secrets.RENDER_STAGING_SERVICE_ID }}" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" | jq -r '.serviceDetails.url')
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "Staging URL: $URL"

      - name: Smoke tests — staging
        id: smoke
        run: |
          BASE_URL="${{ steps.get-url.outputs.url }}"
          echo "Running smoke tests against $BASE_URL"

          # Health check
          echo "▶ GET /health"
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "$BASE_URL/health")
          if [ "$STATUS" != "200" ]; then
            echo "Health check failed: HTTP $STATUS"
            exit 1
          fi
          echo "  ✓ /health returned 200"

          # API reachable (Swagger/docs)
          echo "▶ GET /docs"
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "$BASE_URL/docs")
          if [ "$STATUS" != "200" ] && [ "$STATUS" != "301" ] && [ "$STATUS" != "302" ]; then
            echo "Docs endpoint failed: HTTP $STATUS"
            exit 1
          fi
          echo "  ✓ /docs returned $STATUS"

          echo "All smoke tests passed"

      - name: Rollback staging on failure
        if: failure() && steps.trigger.outputs.deploy_id != ''
        run: |
          echo "## ❌ Staging deploy failed — rolling back" >> $GITHUB_STEP_SUMMARY
          # Retrieve the last successful deploy and re-trigger it
          PREV_DEPLOY=$(curl -sf "${{ env.RENDER_API }}/services/${{ secrets.RENDER_STAGING_SERVICE_ID }}/deploys?limit=5" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            | jq -r '[.[] | select(.status == "live")][0].id')
          if [ "$PREV_DEPLOY" != "null" ] && [ -n "$PREV_DEPLOY" ]; then
            echo "Re-deploying last live deploy: $PREV_DEPLOY"
            curl -sf -X POST "${{ env.RENDER_API }}/services/${{ secrets.RENDER_STAGING_SERVICE_ID }}/deploys/$PREV_DEPLOY/rollback" \
              -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" || true
            echo "**Rolled back to:** \`$PREV_DEPLOY\`" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Staging deploy summary
        if: success()
        run: |
          echo "## 🟦 Staging Deploy" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Status** | ✅ Live |" >> $GITHUB_STEP_SUMMARY
          echo "| **URL** | ${{ steps.get-url.outputs.url }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Smoke tests** | ✅ Passed |" >> $GITHUB_STEP_SUMMARY

  # ──────────────────────────────────────────────────────────
  # PRODUCTION — triggered by push to main
  # ──────────────────────────────────────────────────────────
  deploy-production:
    name: 🟩 Deploy → Production
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    environment:
      name: production
      url: ${{ steps.get-url.outputs.url }}
    outputs:
      deploy_id: ${{ steps.trigger.outputs.deploy_id }}

    steps:
      - name: Trigger Render production deploy
        id: trigger
        run: |
          RESPONSE=$(curl -sf -X POST "${{ env.RENDER_API }}/services/${{ secrets.RENDER_PRODUCTION_SERVICE_ID }}/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": "do_not_clear"}')
          DEPLOY_ID=$(echo "$RESPONSE" | jq -r '.id')
          echo "deploy_id=$DEPLOY_ID" >> "$GITHUB_OUTPUT"
          echo "Triggered deploy: $DEPLOY_ID"

      - name: Wait for production deploy to complete
        timeout-minutes: 10
        run: |
          DEPLOY_ID="${{ steps.trigger.outputs.deploy_id }}"
          echo "Polling deploy $DEPLOY_ID..."
          for i in $(seq 1 40); do
            STATUS=$(curl -sf "${{ env.RENDER_API }}/services/${{ secrets.RENDER_PRODUCTION_SERVICE_ID }}/deploys/$DEPLOY_ID" \
              -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" | jq -r '.status')
            echo "  [$i/40] status: $STATUS"
            if [ "$STATUS" = "live" ]; then
              echo "Deploy is live!"
              exit 0
            fi
            if [ "$STATUS" = "deactivated" ] || [ "$STATUS" = "build_failed" ] || [ "$STATUS" = "update_failed" ]; then
              echo "Deploy failed with status: $STATUS"
              exit 1
            fi
            sleep 15
          done
          echo "Timed out waiting for deploy"
          exit 1

      - name: Get production URL
        id: get-url
        run: |
          URL=$(curl -sf "${{ env.RENDER_API }}/services/${{ secrets.RENDER_PRODUCTION_SERVICE_ID }}" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" | jq -r '.serviceDetails.url')
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "Production URL: $URL"

      - name: Smoke tests — production
        id: smoke
        run: |
          BASE_URL="${{ steps.get-url.outputs.url }}"
          echo "Running smoke tests against $BASE_URL"

          echo "▶ GET /health"
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "$BASE_URL/health")
          if [ "$STATUS" != "200" ]; then
            echo "Health check failed: HTTP $STATUS"
            exit 1
          fi
          echo "  ✓ /health returned 200"

          echo "▶ GET /docs"
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "$BASE_URL/docs")
          if [ "$STATUS" != "200" ] && [ "$STATUS" != "301" ] && [ "$STATUS" != "302" ]; then
            echo "Docs endpoint failed: HTTP $STATUS"
            exit 1
          fi
          echo "  ✓ /docs returned $STATUS"

          echo "All smoke tests passed"

      - name: Rollback production on failure
        if: failure() && steps.trigger.outputs.deploy_id != ''
        run: |
          echo "## ❌ Production deploy failed — rolling back" >> $GITHUB_STEP_SUMMARY
          PREV_DEPLOY=$(curl -sf "${{ env.RENDER_API }}/services/${{ secrets.RENDER_PRODUCTION_SERVICE_ID }}/deploys?limit=5" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            | jq -r '[.[] | select(.status == "live")][0].id')
          if [ "$PREV_DEPLOY" != "null" ] && [ -n "$PREV_DEPLOY" ]; then
            echo "Re-deploying last live deploy: $PREV_DEPLOY"
            curl -sf -X POST "${{ env.RENDER_API }}/services/${{ secrets.RENDER_PRODUCTION_SERVICE_ID }}/deploys/$PREV_DEPLOY/rollback" \
              -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" || true
            echo "**Rolled back to:** \`$PREV_DEPLOY\`" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Production deploy summary
        if: success()
        run: |
          echo "## 🟩 Production Deploy" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Status** | ✅ Live |" >> $GITHUB_STEP_SUMMARY
          echo "| **URL** | ${{ steps.get-url.outputs.url }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Smoke tests** | ✅ Passed |" >> $GITHUB_STEP_SUMMARY

  # ──────────────────────────────────────────────────────────
  # MANUAL ROLLBACK — workflow_dispatch for emergency use
  # ──────────────────────────────────────────────────────────
  manual-rollback:
    name: ⏪ Manual Rollback
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Rollback production to previous deploy
        run: |
          PREV_DEPLOY=$(curl -sf "${{ env.RENDER_API }}/services/${{ secrets.RENDER_PRODUCTION_SERVICE_ID }}/deploys?limit=5" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            | jq -r '[.[] | select(.status == "live")][0].id')
          echo "Rolling back production to: $PREV_DEPLOY"
          curl -sf -X POST "${{ env.RENDER_API }}/services/${{ secrets.RENDER_PRODUCTION_SERVICE_ID }}/deploys/$PREV_DEPLOY/rollback" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}"
          echo "## ⏪ Manual Rollback Triggered" >> $GITHUB_STEP_SUMMARY
          echo "Rolled back to deploy: \`$PREV_DEPLOY\`" >> $GITHUB_STEP_SUMMARY
